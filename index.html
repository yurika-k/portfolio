<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — YK</title>
<meta name="description" content="Portfolio of YK, creative designer working across illustration, UI/UX, video and products.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <span class="logo">Portfolio</span>
    <div style="display:flex; align-items:center; gap:18px;">
      <a id="lang-switch" href="ja/index.html" style="font-size:.85rem; letter-spacing:.06em; border-bottom:1px solid var(--accent);">日本語</a>
      <button id="contact-trigger" class="contact-trigger" type="button" aria-label="Contact">
        <img src="assets/images/contact_img.png" alt="">
      </button>
    </div>
  </div>
</header>

<main>
  <section id="mv" class="mv"></section>

  <section id="works" class="works">
    <h2 class="section-title" id="works-title">Works</h2>
    <div class="works-grid" id="works-grid"></div>
  </section>

  <section id="profile" class="profile">
    <h2 class="section-title" id="profile-title">Profile</h2>
    <div class="profile-inner">
      <div class="profile-photo-wrap">
        <img id="profile-photo" class="profile-photo" src="assets/images/profile_img.jpg" alt="">
        <span class="profile-name" id="profile-name">YYYYYYY</span>
      </div>
      <div class="profile-bio">
        <div id="profile-bio-text"></div>
        <div class="social-icons" id="social-icons"></div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <p id="footer-text">Copyright &copy; portfolio</p>
</footer>

<!-- modal shells: populated by main.js -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="modal" id="work-modal"></div>
<div class="modal contact-modal" id="contact-modal"></div>

<script src="js/data.en.js"></script>
<script src="js/main.js"></script>
</body>
</html>
